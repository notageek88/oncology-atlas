<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncologyAtlas — Global Cancer Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b0d14; color: #e0e0e0; overflow: hidden; }

        /* ── Header ── */
        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            padding: 11px 24px;
            background: rgba(11,13,20,0.97); border-bottom: 1px solid #1a1d2e;
            display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(10px);
        }
        h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
        h1 span { color: #4f8ef7; }
        .badge { background: #0d1e3a; color: #4f8ef7; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid #1a3a6e; }
        .meta { color: #333; font-size: 11px; margin-left: auto; display: flex; gap: 14px; align-items: center; }
        .meta a { color: #4f8ef7; text-decoration: none; }

        /* ── Controls ── */
        #controls {
            position: fixed; top: 47px; left: 0; right: 0; z-index: 200;
            padding: 7px 20px;
            background: rgba(9,11,18,0.96); border-bottom: 1px solid #12151f;
            display: flex; gap: 8px; align-items: center;
            backdrop-filter: blur(8px);
        }
        .ctrl-label { font-size: 10px; color: #334; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
        select { background: #10131f; border: 1px solid #1a1d2e; color: #aab; padding: 5px 10px; border-radius: 5px; font-size: 12px; cursor: pointer; }
        select:hover, select:focus { border-color: #4f8ef7; outline: none; color: #dde; }
        .sep { width: 1px; height: 20px; background: #1a1d2e; margin: 0 4px; }
        .compare-btn {
            margin-left: auto; background: #0d1e3a; color: #4f8ef7;
            border: 1px solid #1a3a6e; padding: 5px 14px;
            border-radius: 5px; font-size: 11px; cursor: pointer;
        }
        .compare-btn:hover { background: #1a3a6e; }
        .compare-btn.active { background: #1a3a6e; border-color: #4f8ef7; }

        /* ── Map ── */
        #map-container { position: fixed; top: 83px; left: 0; right: 0; bottom: 0; transition: right 0.35s; }
        #map-container.panel-open { right: 360px; }
        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }
        .country { transition: opacity 0.1s; }
        .country:hover { opacity: 0.75; }
        .country.selected { stroke: #fff !important; stroke-width: 1.2px !important; opacity: 1 !important; }

        /* ── Side Panel ── */
        #side-panel {
            position: fixed; top: 83px; right: -360px; bottom: 0; width: 360px; z-index: 150;
            background: #09090f; border-left: 1px solid #1a1d2e;
            overflow-y: auto; transition: right 0.35s;
            padding: 0 0 40px 0;
        }
        #side-panel.open { right: 0; }

        .panel-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid #1a1d2e;
            position: sticky; top: 0; background: #09090f; z-index: 10;
        }
        .panel-header h2 { font-size: 16px; font-weight: 700; color: #eee; }
        .panel-header .sub { font-size: 11px; color: #444; margin-top: 2px; }
        .panel-close {
            position: absolute; top: 14px; right: 16px;
            background: none; border: none; color: #444; font-size: 18px;
            cursor: pointer; padding: 4px 8px; border-radius: 4px;
        }
        .panel-close:hover { color: #eee; background: #1a1d2e; }

        .panel-section { padding: 16px 20px; border-bottom: 1px solid #0f1118; }
        .panel-section h3 { font-size: 10px; color: #334; text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 12px; }

        /* Bar chart in panel */
        .bar-row { margin: 8px 0; }
        .bar-label { font-size: 11px; color: #778; margin-bottom: 3px; display: flex; justify-content: space-between; }
        .bar-label span { color: #4f8ef7; font-weight: 600; }
        .bar-track { background: #0f1220; border-radius: 3px; height: 7px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

        /* Sparkline */
        .sparkline-row { margin: 10px 0; }
        .sparkline-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .sparkline-label { font-size: 11px; color: #778; }
        .sparkline-val { font-size: 12px; font-weight: 700; color: #4f8ef7; }
        .sparkline-delta { font-size: 10px; margin-left: 5px; }
        .sparkline-delta.up { color: #e05c5c; }
        .sparkline-delta.down { color: #2db565; }
        .sparkline-svg { display: block; overflow: visible; }

        /* Bool pills in panel */
        .pill-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .pill { padding: 8px 10px; border-radius: 7px; font-size: 11px; display: flex; align-items: center; gap: 6px; }
        .pill.yes { background: #0d2a1a; border: 1px solid #1a5c35; color: #2db565; }
        .pill.no  { background: #2a0d0d; border: 1px solid #5c1a1a; color: #e05c5c; }
        .pill.na  { background: #131520; border: 1px solid #1a1d2e; color: #444; }
        .pill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

        /* Compare mode */
        #compare-list { padding: 12px 20px; }
        #compare-list .cmp-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; margin: 4px 0;
            background: #0f1220; border-radius: 7px; border: 1px solid #1a1d2e;
            font-size: 12px;
        }
        #compare-list .cmp-item .rm { color: #444; cursor: pointer; font-size: 14px; }
        #compare-list .cmp-item .rm:hover { color: #e05c5c; }
        #compare-chart { padding: 0 20px 16px; }

        /* ── Timeline Slider ── */
        #timeline {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 100; background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 10px; padding: 10px 20px 8px;
            display: none; align-items: center; gap: 14px;
            backdrop-filter: blur(8px); min-width: 360px;
        }
        #timeline.visible { display: flex; }
        #timeline-play {
            background: #0d1e3a; border: 1px solid #1a3a6e; color: #4f8ef7;
            width: 28px; height: 28px; border-radius: 50%; font-size: 12px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        #timeline-play:hover { background: #1a3a6e; }
        #year-slider {
            -webkit-appearance: none; flex: 1; height: 3px;
            background: #1a1d2e; border-radius: 2px; outline: none; cursor: pointer;
        }
        #year-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #4f8ef7; cursor: pointer;
            border: 2px solid #0b0d14;
        }
        #year-label { font-size: 16px; font-weight: 700; color: #4f8ef7; min-width: 38px; text-align: center; }

        /* Top rankings */
        .rank-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 1px solid #0d0f18; }
        .rank-row:last-child { border: none; }
        .rank-num { width: 18px; font-size: 10px; color: #334; text-align: right; flex-shrink: 0; }
        .rank-bar-wrap { flex: 1; }
        .rank-name { font-size: 11px; color: #889; margin-bottom: 2px; }
        .rank-bar-track { background: #0f1220; border-radius: 2px; height: 5px; }
        .rank-bar-fill { height: 100%; border-radius: 2px; }
        .rank-val { font-size: 11px; font-weight: 600; min-width: 36px; text-align: right; flex-shrink: 0; }

        /* ── Tooltip ── */
        #tooltip {
            position: fixed; pointer-events: none; z-index: 300;
            background: rgba(9,11,18,0.97); border: 1px solid #1a1d2e;
            border-radius: 9px; padding: 10px 14px;
            font-size: 11px; min-width: 180px;
            display: none; box-shadow: 0 10px 36px rgba(0,0,0,0.7);
        }
        #tooltip h4 { font-size: 13px; margin-bottom: 6px; color: #eee; }
        .tip-val { color: #4f8ef7; font-weight: 600; }
        .tip-row { padding: 2px 0; color: #666; }

        /* ── Legend ── */
        #legend {
            position: fixed; bottom: 20px; left: 16px; z-index: 100;
            background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 9px; padding: 11px 15px; font-size: 11px;
            backdrop-filter: blur(8px);
        }
        #leg-title { font-size: 9px; color: #334; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        #leg-gradient { height: 8px; border-radius: 4px; margin-bottom: 5px; }
        #leg-labels { display: flex; justify-content: space-between; color: #334; font-size: 9px; }
        .bool-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; color: #778; }
        .bool-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        #stats {
            position: fixed; bottom: 20px; right: 16px; z-index: 100;
            background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 7px; padding: 7px 14px;
            font-size: 10px; color: #334;
            transition: right 0.35s;
        }
        #stats.panel-open { right: 376px; }
        #stats b { color: #4f8ef7; }

        /* Clinics layer */
        .clinic-dot {
            cursor: pointer;
            transition: r 0.15s;
        }
        .clinic-dot:hover { opacity: 0.9; }
        .clinic-tooltip {
            position: fixed; z-index: 500;
            background: #0d0f1a; border: 1px solid #1a1d2e;
            border-radius: 8px; padding: 10px 14px;
            font-size: 11px; color: #aab; max-width: 240px;
            pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.7);
        }
        .clinic-tooltip .ct-name { font-weight: 700; color: #dde; font-size: 12px; margin-bottom: 4px; }
        .clinic-tooltip .ct-city { color: #667; font-size: 10px; margin-bottom: 6px; }
        .clinic-tooltip .ct-tag {
            display: inline-block; padding: 1px 7px; border-radius: 99px;
            font-size: 9px; font-weight: 600; margin-right: 4px; margin-bottom: 4px;
        }
        .ct-tag.standard { background: #0d3a1e; color: #4fc88a; border: 1px solid #1a6e3a; }
        .ct-tag.nonstandard { background: #3a1a0d; color: #f7a04f; border: 1px solid #6e3a1a; }
        .ct-tag.experimental { background: #2a0d3a; color: #c84ff7; border: 1px solid #5a1a6e; }
        .ct-tag.controversial { background: #3a0d0d; color: #f74f4f; border: 1px solid #6e1a1a; }
        .ct-tag.tourism { background: #0d2a3a; color: #4fb8f7; border: 1px solid #1a5a6e; }
        .clinic-legend {
            position: fixed; bottom: 20px; left: 200px; z-index: 300;
            background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 8px; padding: 10px 14px; font-size: 10px;
            display: none;
        }
        .clinic-legend.visible { display: block; }
        .clinic-legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .clinic-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* Flow arrows */
        .flow-line { pointer-events: none; }

        /* Lang switcher */
        #lang-btn {
            background: #10131f; border: 1px solid #1a1d2e; color: #778;
            padding: 5px 10px; border-radius: 5px; font-size: 12px;
            cursor: pointer; position: relative;
        }
        #lang-btn:hover { border-color: #4f8ef7; color: #aab; }
        #lang-menu {
            display: none; position: absolute; top: 33px; right: 0;
            background: #0d0f1a; border: 1px solid #1a1d2e;
            border-radius: 8px; z-index: 500; min-width: 160px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7); overflow: hidden;
        }
        #lang-menu.open { display: block; }
        .lang-item {
            padding: 8px 14px; cursor: pointer; font-size: 12px;
            color: #889; display: flex; gap: 10px; align-items: center;
        }
        .lang-item:hover { background: #1a1d2e; color: #dde; }
        .lang-item.active { color: #4f8ef7; }
    </style>
</head>
<body>

<div id="header">
    <h1>Oncology<span>Atlas</span></h1>
    <div class="badge">WHO GHO 2019–2022</div>
    <div class="meta">
        <span id="meta-countries">— countries</span>
        <span>18 metrics</span>
        <a href="https://github.com/notageek88/oncology-atlas" target="_blank">GitHub ↗</a>
    </div>
</div>

<div id="controls">
    <span class="ctrl-label">Category</span>
    <select id="category" onchange="onCategoryChange()">
        <option value="death">Cancer Mortality (/ 100k)</option>
        <option value="daly">Disease Burden — DALYs (/ 100k)</option>
        <option value="infra">Healthcare Infrastructure</option>
    </select>
    <div class="sep"></div>
    <span class="ctrl-label">Type</span>
    <select id="metric" onchange="updateMap()">
        <option value="death_cancer_all">All cancers combined</option>
        <option value="death_breast">Breast cancer</option>
        <option value="death_colon">Colorectal cancer</option>
        <option value="death_liver">Liver cancer</option>
        <option value="death_mouth">Mouth & oropharynx</option>
        <option value="death_oesophagus">Oesophagus</option>
    </select>
    <div class="sep"></div>
    <div style="position:relative">
        <input id="search" type="text" placeholder="🔍 Search country..." autocomplete="off"
            oninput="onSearch(this.value)" onfocus="showSuggest()" onblur="setTimeout(hideSuggest,200)"
            style="background:#10131f;border:1px solid #1a1d2e;color:#ccd;padding:5px 10px 5px 10px;
                   border-radius:5px;font-size:12px;width:190px;outline:none">
        <div id="suggest" style="display:none;position:absolute;top:32px;left:0;width:240px;
            background:#0d0f1a;border:1px solid #1a1d2e;border-radius:7px;z-index:500;
            max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.7)"></div>
    </div>
    <button class="compare-btn" id="compare-toggle" onclick="toggleCompare()">⚖ Compare</button>
    <button class="compare-btn" id="timeline-toggle" onclick="toggleTimeline()" style="margin-left:4px" data-i18n="timeline">▶ Timeline</button>
    <button class="compare-btn" id="clinics-toggle" onclick="toggleClinics()" style="margin-left:4px" data-i18n="clinics_btn">🏥 Clinics</button>
    <button class="compare-btn" id="flows-toggle" onclick="toggleFlows()" style="margin-left:4px" data-i18n="flows_btn">✈ Flows</button>
    <div style="position:relative;margin-left:4px">
        <button id="lang-btn" onclick="toggleLangMenu()">🌐 EN</button>
        <div id="lang-menu"></div>
    </div>
    <a href="data/countries_cancer.csv" download style="margin-left:4px;background:#0d2a1a;color:#2db565;
        border:1px solid #1a5c35;padding:5px 12px;border-radius:5px;font-size:11px;text-decoration:none">
        ↓ CSV
    </a>
</div>

<div id="map-container"><svg id="svg"></svg></div>
<div id="tooltip"></div>

<!-- Side panel -->
<div id="side-panel">
    <div class="panel-header">
        <h2 id="panel-title">Country Profile</h2>
        <div class="sub" id="panel-sub">Click a country on the map</div>
        <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div id="panel-content"></div>
</div>

<!-- Timeline slider -->
<div id="timeline">
    <button id="timeline-play" onclick="togglePlay()">▶</button>
    <span id="year-label">2000</span>
    <input id="year-slider" type="range" min="2000" max="2021" step="1" value="2021" oninput="onYearSlide(this.value)">
</div>

<div class="clinic-legend" id="clinic-legend">
    <div style="font-size:9px;color:#334;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:7px" data-i18n="clinic_legend_title">Cancer Clinics</div>
    <div class="clinic-legend-row"><div class="clinic-legend-dot" style="background:#4fc88a"></div><span style="color:#aab" data-i18n="clinic_standard">Standard (FDA/EMA approved)</span></div>
    <div class="clinic-legend-row"><div class="clinic-legend-dot" style="background:#f7a04f"></div><span style="color:#aab" data-i18n="clinic_integrative">Integrative / Alternative</span></div>
    <div class="clinic-legend-row"><div class="clinic-legend-dot" style="background:#c84ff7"></div><span style="color:#aab" data-i18n="clinic_experimental">Experimental</span></div>
    <div class="clinic-legend-row"><div class="clinic-legend-dot" style="background:#f74f4f"></div><span style="color:#aab" data-i18n="clinic_controversial">Controversial</span></div>
    <div class="clinic-legend-row"><div style="width:10px;height:2px;background:#4fb8f7;border-radius:1px"></div><span style="color:#aab" data-i18n="clinic_flow">✈ Migration flow</span></div>
</div>

<div id="legend">
    <div id="leg-title">Death rate / 100k</div>
    <div id="leg-body"></div>
</div>

<div id="stats">
    <b id="stat-n">—</b> countries &nbsp;·&nbsp; <b>WHO GHO</b> &nbsp;·&nbsp; MIT
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
<script>

// ── Config ─────────────────────────────────────────────────────────────────
const METRIC_GROUPS = {
    death: {
        label: "Death rate / 100k",
        options: {
            death_cancer_all: "All cancers", death_breast: "Breast",
            death_colon: "Colorectal", death_liver: "Liver",
            death_mouth: "Mouth/oropharynx", death_oesophagus: "Oesophagus"
        },
        type: "numeric",
        domain: [20, 50, 80, 120, 180],
        colors: ["#0d1433","#1a2d7a","#2855c2","#4f8ef7","#a0c4ff"],
        nodata: "#0f1220"
    },
    daly: {
        label: "DALYs / 100k",
        options: {
            daly_breast: "Breast", daly_colon: "Colorectal",
            daly_liver: "Liver", daly_mouth: "Mouth/oropharynx", daly_oesophagus: "Oesophagus"
        },
        type: "numeric",
        domain: [50, 100, 160, 220, 320],
        colors: ["#0d2615","#155228","#1e8040","#2db565","#7aeaaa"],
        nodata: "#0f1220"
    },
    infra: {
        label: "Infrastructure",
        options: {
            cancer_surgery: "Cancer surgery", cancer_registry: "Cancer registry",
            cancer_plan: "National plan", breast_screening: "Breast screening",
            cancer_dept: "Cancer dept (tertiary)"
        },
        type: "boolean", nodata: "#0f1220"
    }
};

const BOOL_COLORS = { "Yes": "#2db565", "No": "#e05c5c" };
const DEATH_MAX = { death_cancer_all:200, death_breast:30, death_colon:30, death_liver:20, death_mouth:10, death_oesophagus:10 };
const DALY_MAX  = { daly_breast:350, daly_colon:350, daly_liver:200, daly_mouth:150, daly_oesophagus:150 };
const INFRA_KEYS = ["cancer_surgery","cancer_registry","cancer_plan","breast_screening","cancer_dept"];
const INFRA_LABELS = { cancer_surgery:"Cancer Surgery", cancer_registry:"Cancer Registry", cancer_plan:"National Cancer Plan", breast_screening:"Breast Screening", cancer_dept:"Cancer Dept" };

// ── State ──────────────────────────────────────────────────────────────────
let dataByNumId = {}, allData = [];
let worldData = null, trendsData = {};
let currentMetric = "death_cancer_all";
let selectedEl = null;
let compareMode = false;
let compareList = [];
let svg, g, pathGen, projection;

// ── Helpers ────────────────────────────────────────────────────────────────
function getCat(metric) {
    for (const [cat, grp] of Object.entries(METRIC_GROUPS))
        if (metric in grp.options || (cat==="death" && metric==="death_cancer_all")) return cat;
    return "death";
}

function getColor(d, metric) {
    const grp = METRIC_GROUPS[getCat(metric)];
    if (!d) return grp.nodata;
    const val = d[metric];
    if (val == null) return grp.nodata;
    if (grp.type === "boolean") return BOOL_COLORS[val] || "#2a2d40";
    const n = parseFloat(val);
    if (isNaN(n)) return grp.nodata;
    return d3.scaleThreshold().domain(grp.domain).range([grp.nodata, ...grp.colors])(n);
}

// ── Legend ─────────────────────────────────────────────────────────────────
function buildLegend(metric) {
    const grp = METRIC_GROUPS[getCat(metric)];
    document.getElementById("leg-title").textContent = grp.label;
    const body = document.getElementById("leg-body");
    if (grp.type === "boolean") {
        body.innerHTML = [["Yes","#2db565"],["No","#e05c5c"],["No data","#2a2d40"]]
            .map(([l,c]) => `<div class="bool-row"><div class="bool-dot" style="background:${c}"></div>${l}</div>`).join("");
    } else {
        const d = grp.domain, lo=d[0], mid=d[Math.floor(d.length/2)], hi=d[d.length-1];
        body.innerHTML = `
            <div id="leg-gradient" style="background:linear-gradient(to right,${[grp.nodata,...grp.colors].join(",")})"></div>
            <div id="leg-labels"><span>${lo}</span><span>${mid}</span><span>${hi}+</span></div>
            <div style="color:#2a2d40;font-size:9px;margin-top:5px;display:flex;align-items:center;gap:5px">
                <div style="width:7px;height:7px;border-radius:50%;background:#0f1220;border:1px solid #1a1d2e"></div>No data</div>`;
    }
}

// ── Tooltip ────────────────────────────────────────────────────────────────
function showTip(event, d, data) {
    const tip = document.getElementById("tooltip");
    const n = data?.name || d.properties.name;
    const val = data ? data[currentMetric] : null;
    const fv = val != null ? (typeof val === "number" ? val.toFixed(1) : val) : "No data";
    const cat = getCat(currentMetric);
    const metricLabel = METRIC_GROUPS[cat].options[currentMetric] || "All cancers";
    tip.innerHTML = `<h4>${n}</h4>
        <div class="tip-row">${metricLabel}: <span class="tip-val">${fv}</span></div>
        <div class="tip-row" style="color:#334;margin-top:4px">Click for full profile</div>`;
    tip.style.display = "block";
    moveTip(event);
}
function moveTip(e) {
    const tip = document.getElementById("tooltip");
    let x = e.clientX + 14, y = e.clientY - 10;
    if (x + 220 > window.innerWidth) x = e.clientX - 220;
    if (y + 120 > window.innerHeight) y = e.clientY - 120;
    tip.style.left = x + "px"; tip.style.top = y + "px";
}

function toggleCompare() {
    compareMode = !compareMode;
    document.getElementById("compare-toggle").classList.toggle("active", compareMode);
    if (!compareMode) { compareList = []; closePanel(); }
}

function addToCompare(data, name) {
    if (!data) return;
    if (compareList.find(c => c.country === data.country)) return;
    if (compareList.length >= 4) compareList.shift();
    compareList.push(data);
    renderCompare();
}

function renderCompare() {
    const keys = Object.keys(METRIC_GROUPS.death.options);
    const colors = ["#4f8ef7","#2db565","#f0a030","#e05c5c"];

    const listHtml = compareList.map((c,i) =>
        `<div class="cmp-item">
            <div style="width:10px;height:10px;border-radius:50%;background:${colors[i]};flex-shrink:0"></div>
            <span style="flex:1;margin-left:8px">${c.name || c.country}</span>
            <span class="rm" onclick="removeCompare('${c.country}')">✕</span>
        </div>`).join("");

    const barsHtml = keys.map(k => {
        const label = METRIC_GROUPS.death.options[k];
        const max = DEATH_MAX[k] || 200;
        const bars = compareList.map((c,i) => {
            const v = parseFloat(c[k]);
            if (isNaN(v)) return "";
            const pct = Math.min(100, (v/max)*100);
            return `<div style="margin:2px 0">
                <div style="display:flex;justify-content:space-between;font-size:10px;color:#556">
                    <span>${c.name||c.country}</span><span style="color:${colors[i]}">${v.toFixed(1)}</span>
                </div>
                <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${colors[i]}"></div></div>
            </div>`;
        }).join("");
        return bars ? `<div style="margin:10px 0"><div style="font-size:10px;color:#334;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px">${label}</div>${bars}</div>` : "";
    }).join("");

    document.getElementById("panel-title").textContent = "Compare Countries";
    document.getElementById("panel-sub").textContent = `${compareList.length} selected — click map to add`;
    document.getElementById("panel-content").innerHTML = `
        <div class="panel-section"><h3>Selected</h3><div id="compare-list">${listHtml}</div></div>
        <div class="panel-section"><h3>Cancer mortality comparison</h3><div id="compare-chart">${barsHtml||'<div style="color:#334;font-size:11px">Add countries to compare</div>'}</div></div>`;

    document.getElementById("side-panel").classList.add("open");
    document.getElementById("map-container").classList.add("panel-open");
    document.getElementById("stats").classList.add("panel-open");
}

function removeCompare(iso3) {
    compareList = compareList.filter(c => c.country !== iso3);
    if (compareList.length === 0) closePanel();
    else renderCompare();
}

// ── Clinics & Flows layer ─────────────────────────────────────────────────
let clinicsData = null;
let clinicsVisible = false;
let flowsVisible = false;
let clinicTooltipEl = null;

const CLINIC_COLORS = {
    standard: "#4fc88a",
    integrative: "#f7a04f",
    alternative: "#f7a04f",
    anthroposophic: "#f7a04f",
    stem_cell: "#f7d34f",
    experimental: "#c84ff7",
    immunotherapy_experimental: "#c84ff7",
    controversial: "#f74f4f"
};

function clinicColor(c) {
    if (c.type === "standard") return CLINIC_COLORS.standard;
    return CLINIC_COLORS[c.category] || CLINIC_COLORS.alternative;
}

function toggleClinics() {
    clinicsVisible = !clinicsVisible;
    document.getElementById("clinics-toggle").classList.toggle("active", clinicsVisible);
    document.getElementById("clinic-legend").classList.toggle("visible", clinicsVisible || flowsVisible);
    if (clinicsVisible && !clinicsData) {
        d3.json("data/clinics.json").then(data => {
            clinicsData = data;
            renderClinics();
        });
    } else {
        renderClinics();
    }
}

function toggleFlows() {
    flowsVisible = !flowsVisible;
    document.getElementById("flows-toggle").classList.toggle("active", flowsVisible);
    document.getElementById("clinic-legend").classList.toggle("visible", clinicsVisible || flowsVisible);
    if (flowsVisible && !clinicsData) {
        d3.json("data/clinics.json").then(data => {
            clinicsData = data;
            renderFlows();
            if (clinicsVisible) renderClinics(); // keep clinics on top
        });
    } else {
        renderFlows();
        if (clinicsVisible) renderClinics(); // keep clinics on top
    }
}

function renderClinics() {
    // Add inside the zoom group (g) so pan/zoom apply automatically
    g.selectAll(".clinic-layer").remove();
    if (!clinicsVisible || !clinicsData) return;

    const layer = g.append("g").attr("class", "clinic-layer");
    const proj = projection;

    clinicsData.clinics.forEach(clinic => {
        const pt = proj([clinic.lon, clinic.lat]);
        if (!pt) return;
        const [x, y] = pt;
        const r = clinic.tier === "flagship" ? 7 : clinic.tier === "top" ? 5 : 4;
        const col = clinicColor(clinic);

        const dot = layer.append("g")
            .attr("class", "clinic-dot")
            .attr("transform", `translate(${x},${y})`);

        if (clinic.tier === "flagship") {
            dot.append("circle").attr("r", r + 4)
                .attr("fill", "none")
                .attr("stroke", col)
                .attr("stroke-width", 0.8)
                .attr("opacity", 0.3);
        }
        dot.append("circle").attr("r", r)
            .attr("fill", col)
            .attr("stroke", "#0b0d14")
            .attr("stroke-width", 1.2)
            .attr("opacity", 0.9);

        if (clinic.medical_tourism) {
            dot.append("text")
                .attr("text-anchor", "middle")
                .attr("dy", r + 8)
                .attr("font-size", 7)
                .attr("fill", "#4fb8f7")
                .text("✈");
        }

        dot.on("mousemove", function(event) {
            showClinicTooltip(clinic, event.clientX, event.clientY);
        }).on("mouseleave", function() {
            hideClinicTooltip();
        }).on("click", function(event) {
            event.stopPropagation();
            showClinicPanel(clinic);
        });
    });
}

function renderFlows() {
    // Add inside zoom group so pan/zoom apply automatically
    g.selectAll(".flow-layer").remove();
    if (!flowsVisible || !clinicsData) return;

    // Append flow layer (under clinic dots — append first, then clinics on top)
    const layer = g.append("g").attr("class", "flow-layer");
    const proj = projection;

    const fallback = {
        "RUS":[61,57],"DEU":[10.45,51.16],"ISR":[34.85,31.04],"TUR":[35.24,38.96],
        "USA":[-95.71,37.09],"GBR":[-3.43,55.37],"FRA":[2.21,46.22],"NLD":[5.29,52.13],
        "ITA":[12.56,41.87],"SWE":[18.64,60.12],"CHE":[8.22,46.81],
        "UKR":[31.16,48.37],"KAZ":[66.92,48.01],"SAU":[45.07,23.88],"EGY":[30.80,26.82],
        "IRN":[53.68,32.42],"IRQ":[43.67,33.22],"IND":[78.96,20.59],"THA":[100.99,15.87],
        "SGP":[103.82,1.36],"JPN":[138.25,36.20],"KOR":[127.77,35.91],"CHN":[104.19,35.86],
        "AUS":[133.77,-25.27],"CAN":[-96.80,56.13],"BRA":[-51.92,-14.23],"MEX":[-102.55,23.63],
        "MYS":[109.69,4.21],"IDN":[113.92,-0.79],"VNM":[108.27,14.05],"BGD":[90.35,23.68],
        "NPL":[84.12,28.39],"KHM":[104.99,12.56],"MMR":[95.95,21.91],"NGA":[8.67,9.08],
        "KEN":[37.90,-0.02],"GHA":[-1.02,7.94],"ARG":[-63.61,-38.41],"COL":[-74.29,4.57]
    };

    clinicsData.migration_flows.forEach(flow => {
        const from = fallback[flow.from];
        const to = fallback[flow.to];
        if (!from || !to) return;

        const ptFrom = proj(from);
        const ptTo = proj(to);
        if (!ptFrom || !ptTo) return;

        const [x1, y1] = ptFrom;
        const [x2, y2] = ptTo;

        const mx = (x1 + x2) / 2;
        const my = (y1 + y2) / 2 - Math.sqrt((x2-x1)**2+(y2-y1)**2) * 0.25;
        const opacity = 0.15 + flow.volume * 0.07;
        const strokeW = 0.6 + flow.volume * 0.3;

        layer.append("path")
            .attr("class", "flow-line")
            .attr("d", `M${x1},${y1} Q${mx},${my} ${x2},${y2}`)
            .attr("fill", "none")
            .attr("stroke", "#4fb8f7")
            .attr("stroke-width", strokeW)
            .attr("opacity", Math.min(opacity + 0.15, 0.75))
            .attr("stroke-dasharray", "6 4")
            .attr("marker-end", "url(#flow-arrow)");
    });
}

// ── i18n ──────────────────────────────────────────────────────────────────
let i18nData = {}, currentLang = "en";
const LANG_FLAGS = {en:"🇬🇧",ru:"🇷🇺",zh:"🇨🇳",es:"🇪🇸",ar:"🇸🇦",hi:"🇮🇳",pt:"🇧🇷",fr:"🇫🇷",de:"🇩🇪",ja:"🇯🇵",id:"🇮🇩"};
const LANG_NAMES = {en:"English",ru:"Русский",zh:"中文",es:"Español",ar:"العربية",hi:"हिन्दी",pt:"Português",fr:"Français",de:"Deutsch",ja:"日本語",id:"Bahasa Indonesia"};

function t(key, fallback) {
    return (i18nData[currentLang] || i18nData["en"] || {})[key] || fallback || key;
}

function applyLang(lang) {
    currentLang = lang;
    const L = i18nData[lang] || i18nData["en"] || {};
    // RTL for Arabic
    document.body.dir = lang === "ar" ? "rtl" : "ltr";
    // Update lang button
    document.getElementById("lang-btn").textContent = `${LANG_FLAGS[lang]||"🌐"} ${lang.toUpperCase()}`;
    // Update data-i18n elements
    document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.dataset.i18n;
        if (L[key]) el.textContent = (el.id === "timeline-toggle" ? "▶ " : "") + L[key];
    });
    // Dropdowns
    updateCategoryOptions();
    updateMetricOptions();
    // Search placeholder
    const si = document.getElementById("search");
    if (si) si.placeholder = "🔍 " + (L["search_placeholder"] || "Search country...");
    // Stats
    const sn = document.getElementById("stat-n");
    if (sn) document.getElementById("meta-countries").textContent = sn.textContent + " " + (L["countries"]||"countries");
    // Update URL
    const url = new URL(window.location);
    url.searchParams.set("lang", lang);
    window.history.replaceState({}, "", url);
    document.getElementById("lang-menu").classList.remove("open");
}

function updateCategoryOptions() {
    const sel = document.getElementById("category");
    if (!sel) return;
    const opts = [
        ["death", t("cat_death")],
        ["daly", t("cat_daly")],
        ["infra", t("cat_infra")]
    ];
    const cur = sel.value;
    sel.innerHTML = opts.map(([v,l]) => `<option value="${v}"${v===cur?" selected":""}>${l}</option>`).join("");
}

function updateMetricOptions() {
    const cat = document.getElementById("category")?.value || "death";
    const sel = document.getElementById("metric");
    if (!sel) return;
    const opts = {
        death: [
            ["death_cancer_all", t("all_cancers")], ["death_breast", t("breast")],
            ["death_colon", t("colon")], ["death_liver", t("liver")],
            ["death_mouth", t("mouth")], ["death_oesophagus", t("oesophagus")]
        ],
        daly: [
            ["daly_breast", t("daly_breast")], ["daly_colon", t("daly_colon")],
            ["daly_liver", t("daly_liver")], ["daly_mouth", t("daly_mouth")], ["daly_oesophagus", t("daly_oesophagus")]
        ],
        infra: [
            ["cancer_surgery", t("surgery")], ["cancer_registry", t("registry")],
            ["cancer_plan", t("plan")], ["breast_screening", t("screening")], ["cancer_dept", t("dept")]
        ]
    };

    sel.innerHTML = (opts[cat]||opts.death).map(([v,l]) => `<option value="${v}"${v===cur?" selected":""}>${l}</option>`).join("");
}

function toggleLangMenu() {
    const menu = document.getElementById("lang-menu");
    if (menu.classList.contains("open")) { menu.classList.remove("open"); return; }
    menu.innerHTML = Object.entries(LANG_FLAGS).map(([code, flag]) =>
        `<div class="lang-item${code===currentLang?" active":""}" onclick="applyLang('${code}')">
            ${flag} <span>${LANG_NAMES[code]||code}</span>
        </div>`
    ).join("");
    menu.classList.add("open");
    document.addEventListener("click", closeLangMenu, {once:true, capture:true});

// ── URL params ─────────────────────────────────────────────────────────────
function parseUrlParams() {
    const p = new URLSearchParams(window.location.search);
    return {
        country: p.get("country"),   // e.g. ?country=RUS
        lang: p.get("lang"),          // e.g. ?lang=ru
        metric: p.get("metric"),      // e.g. ?metric=death_breast
    };
}

function updateUrl(overrides = {}) {
    const url = new URL(window.location);
    Object.entries(overrides).forEach(([k,v]) => v ? url.searchParams.set(k,v) : url.searchParams.delete(k));
    window.history.replaceState({}, "", url);
}

// ── Timeline ────────────────────────────────────────────────────────────────
let ncdSnapshots = {};
let timelineMode = false;
let currentYear = 2021;
let playInterval = null;

const NCD_DOMAIN = [10, 18, 26, 34, 42];
const NCD_COLORS = ["#0d1433","#1a2d7a","#2855c2","#4f8ef7","#a0c4ff"];
const NCD_NODATA = "#0f1220";

function getNcdColor(val) {
    if (val == null) return NCD_NODATA;
    return d3.scaleThreshold().domain(NCD_DOMAIN).range([NCD_NODATA, ...NCD_COLORS])(val);
}

function toggleTimeline() {
    timelineMode = !timelineMode;
    document.getElementById("timeline-toggle").classList.toggle("active", timelineMode);
    document.getElementById("timeline").classList.toggle("visible", timelineMode);
    if (timelineMode) {
        // Switch map to NCD timeline view
        document.getElementById("leg-title").textContent = "NCD mortality risk (%) age 30-70";
        buildNcdLegend();
        applyYearSnapshot(currentYear);
    } else {
        stopPlay();
        updateMap(); // restore normal metric
        buildLegend(currentMetric);
    }
}

function buildNcdLegend() {
    const body = document.getElementById("leg-body");
    const d = NCD_DOMAIN, lo = d[0], mid = d[Math.floor(d.length/2)], hi = d[d.length-1];
    body.innerHTML = `
        <div id="leg-gradient" style="background:linear-gradient(to right,${[NCD_NODATA,...NCD_COLORS].join(",")})"></div>
        <div id="leg-labels"><span>${lo}%</span><span>${mid}%</span><span>${hi}%+</span></div>
        <div style="color:#2a2d40;font-size:9px;margin-top:5px;display:flex;align-items:center;gap:5px">
            <div style="width:7px;height:7px;border-radius:50%;background:#0f1220;border:1px solid #1a1d2e"></div>No data
        </div>`;
    document.getElementById("leg-title").textContent = "NCD mortality risk % (30-70)";
}

function applyYearSnapshot(year) {
    currentYear = year;
    document.getElementById("year-label").textContent = year;
    document.getElementById("year-slider").value = year;
    const snap = ncdSnapshots[year] || {};
    d3.selectAll(".country")
        .transition().duration(playInterval ? 120 : 280)
        .attr("fill", d => {
            const iso3 = dataByNumId[+d.id]?.country;
            return iso3 ? getNcdColor(snap[iso3]) : NCD_NODATA;
        });
}

function onYearSlide(val) { applyYearSnapshot(+val); }

function togglePlay() {
    if (playInterval) { stopPlay(); return; }
    document.getElementById("timeline-play").textContent = "⏹";
    let y = currentYear >= 2021 ? 2000 : currentYear;
    playInterval = setInterval(() => {
        applyYearSnapshot(y);
        if (y >= 2021) { stopPlay(); return; }
        y++;
    }, 400);
}

function stopPlay() {
    clearInterval(playInterval); playInterval = null;
    document.getElementById("timeline-play").textContent = "▶";
}

// ── Top rankings ────────────────────────────────────────────────────────────
function buildRankings(iso3, data) {
    if (!data) return "";
    const metric = "death_cancer_all";
    // Get all countries with this metric
    const all = allData
        .filter(c => c[metric] != null)
        .map(c => ({ name: c.name || c.country, val: parseFloat(c[metric]), iso: c.country }))
        .filter(c => !isNaN(c.val))
        .sort((a,b) => b.val - a.val);

    if (!all.length) return "";
    const rank = all.findIndex(c => c.iso === iso3) + 1;
    const maxVal = all[0].val;

    // Top 5 worst + context around this country
    const top5 = all.slice(0, 5);
    const bottom5 = all.slice(-5).reverse();

    const rowHtml = (c, i, colorFn) => `
        <div class="rank-row">
            <div class="rank-num">${i+1}</div>
            <div class="rank-bar-wrap">
                <div class="rank-name">${c.name}</div>
                <div class="rank-bar-track">
                    <div class="rank-bar-fill" style="width:${(c.val/maxVal*100).toFixed(1)}%;background:${colorFn(c.val)}"></div>
                </div>
            </div>
            <div class="rank-val" style="color:${colorFn(c.val)}">${c.val.toFixed(1)}</div>
        </div>`;

    const thisRank = rank ? `<div style="color:#4f8ef7;font-size:11px;margin:8px 0 4px">
        ${data.name}: ranked <b>#${rank}</b> of ${all.length} countries</div>` : "";

    return `
        <div class="panel-section">
            <h3>Global ranking — all cancer mortality</h3>
            ${thisRank}
            <div style="font-size:9px;color:#334;margin-bottom:6px">HIGHEST MORTALITY</div>
            ${top5.map((c,i) => rowHtml(c, i, v => d3.scaleThreshold().domain(NCD_DOMAIN).range([NCD_NODATA,...NCD_COLORS])(v/3))).join("")}
            <div style="font-size:9px;color:#334;margin:10px 0 6px">LOWEST MORTALITY</div>
            ${bottom5.map((c,i) => rowHtml(c, all.length-5+i, () => "#2db565")).join("")}
        </div>`;
}

// ── Sparklines ─────────────────────────────────────────────────────────────
const TREND_LABELS = {
    death_cancer_all: "All cancers mortality",
    death_breast:     "Breast cancer mortality",
    death_colon:      "Colorectal mortality",
    death_liver:      "Liver cancer mortality",
    death_mouth:      "Mouth cancer mortality",
};
const TREND_COLORS = {
    death_cancer_all: "#4f8ef7",
    death_breast:     "#7eb8f7",
    death_colon:      "#5b9ef0",
    death_liver:      "#3a80e0",
    death_mouth:      "#9b7de8",
};

function renderSparklines(iso3) {
    const container = document.getElementById("trend-charts");
    if (!container) return;
    const ctry = trendsData[iso3];
    if (!ctry) { container.innerHTML = '<div style="color:#334;font-size:11px">No trend data available</div>'; return; }

    const W = 300, H = 52;
    let html = "";

    for (const [key, label] of Object.entries(TREND_LABELS)) {
        const series = ctry[key];
        if (!series || series.length < 2) continue;

        const color = TREND_COLORS[key] || "#4f8ef7";
        const xs = series.map(d => d[0]);
        const ys = series.map(d => d[1]);
        const xMin = Math.min(...xs), xMax = Math.max(...xs);
        const yMin = Math.min(...ys) * 0.92, yMax = Math.max(...ys) * 1.08;

        const xScale = v => ((v - xMin) / (xMax - xMin || 1)) * (W - 20) + 10;
        const yScale = v => H - ((v - yMin) / (yMax - yMin || 1)) * (H - 8) - 4;

        const points = series.map(d => `${xScale(d[0]).toFixed(1)},${yScale(d[1]).toFixed(1)}`).join(" ");
        const areaPoints = `10,${H} ` + points + ` ${xScale(xMax).toFixed(1)},${H}`;

        const first = ys[0], last = ys[ys.length - 1];
        const delta = ((last - first) / first * 100).toFixed(1);
        const deltaSign = delta > 0 ? "+" : "";
        const deltaCls = delta > 0 ? "up" : "down";

        // Year labels
        const yearLabels = xMin === xMax ? `<text x="10" y="${H+10}" fill="#334" font-size="9">${xMin}</text>` :
            `<text x="10" y="${H+10}" fill="#334" font-size="9">${xMin}</text>
             <text x="${W-10}" y="${H+10}" fill="#334" font-size="9" text-anchor="end">${xMax}</text>`;

        html += `<div class="sparkline-row">
            <div class="sparkline-header">
                <span class="sparkline-label">${label}</span>
                <span>
                    <span class="sparkline-val">${last.toFixed(1)}</span>
                    <span class="sparkline-delta ${deltaCls}">${deltaSign}${delta}%</span>
                </span>
            </div>
            <svg class="sparkline-svg" width="${W}" height="${H+14}" viewBox="0 0 ${W} ${H+14}">
                <defs>
                    <linearGradient id="sg-${key}" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
                        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
                    </linearGradient>
                </defs>
                <polygon points="${areaPoints}" fill="url(#sg-${key})"/>
                <polyline points="${points}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
                <circle cx="${xScale(xMax).toFixed(1)}" cy="${yScale(last).toFixed(1)}" r="3" fill="${color}"/>
                ${yearLabels}
            </svg>
        </div>`;
    }

    container.innerHTML = html || '<div style="color:#334;font-size:11px">No trend data</div>';
}

// ── Search ─────────────────────────────────────────────────────────────────
function onSearch(q) {
    const box = document.getElementById("suggest");
    if (!q.trim()) { box.innerHTML = ""; box.style.display = "none"; return; }
    const matches = allData
        .filter(c => (c.name||"").toLowerCase().includes(q.toLowerCase()) || (c.country||"").toLowerCase().includes(q.toLowerCase()))
        .slice(0, 8);
    if (!matches.length) { box.innerHTML = ""; box.style.display = "none"; return; }
    box.innerHTML = matches.map(c =>
        `<div onclick="selectCountry('${c.country}')"
            style="padding:8px 14px;cursor:pointer;font-size:12px;color:#ccd;border-bottom:1px solid #12151f"
            onmouseover="this.style.background='#1a1d2e'" onmouseout="this.style.background=''">
            ${c.name} <span style="color:#334;font-size:10px">${c.country}</span>
        </div>`
    ).join("");
    box.style.display = "block";
}

function showSuggest() {
    const q = document.getElementById("search").value;
    if (q.trim()) onSearch(q);
}
function hideSuggest() { document.getElementById("suggest").style.display = "none"; }

function selectCountry(iso3) {
    document.getElementById("search").value = "";
    hideSuggest();
    const data = allData.find(c => c.country === iso3);
    if (!data) return;
    // highlight on map
    if (selectedEl) d3.select(selectedEl).classed("selected", false);
    const el = g.selectAll(".country").filter(d => dataByNumId[+d.id]?.country === iso3);
    if (!el.empty()) {
        selectedEl = el.node();
        d3.select(selectedEl).classed("selected", true);
        // zoom to country centroid
        const bounds = pathGen.bounds(el.datum());
        const cx = (bounds[0][0] + bounds[1][0]) / 2;
        const cy = (bounds[0][1] + bounds[1][1]) / 2;
        const cont = document.getElementById("map-container");
        svg.transition().duration(600).call(
            d3.zoom().scaleExtent([0.7,14]).on("zoom", e => g.attr("transform", e.transform))
                .transform, d3.zoomIdentity.translate(cont.clientWidth/2 - cx*2.5, cont.clientHeight/2 - cy*2.5).scale(2.5)
        );
    }
    if (compareMode) addToCompare(data, data.name);
    else openProfile(data, data.name);
}

async function init() {
    const [world, cancer, trends, ncds, i18n] = await Promise.all([
        d3.json("data/world-110m.json"),
        d3.json("data/countries_cancer.json"),
        d3.json("data/trends.json").catch(() => ({})),
        d3.json("data/ncd_snapshots.json").catch(() => ({})),
        d3.json("data/i18n.json").catch(() => ({"en":{}}))
    ]);
    worldData = world;
    allData = cancer;
    trendsData = trends;
    ncdSnapshots = ncds;
    i18nData = i18n;

    // Apply URL params
    const params = parseUrlParams();
    if (params.lang && i18nData[params.lang]) applyLang(params.lang);
    if (params.metric) {
        currentMetric = params.metric;
        const sel = document.getElementById("metric");
        if (sel) sel.value = params.metric;
    }
    cancer.forEach(c => { if (c.numeric_id) dataByNumId[c.numeric_id] = c; });
    document.getElementById("stat-n").textContent = cancer.length;
    document.getElementById("meta-countries").textContent = cancer.length + " countries";

    const cont = document.getElementById("map-container");
    const W = cont.clientWidth, H = cont.clientHeight;
    svg = d3.select("#svg").attr("width", W).attr("height", H);
    projection = d3.geoNaturalEarth1().scale(W/6.3).translate([W/2, H/2+20]);
    pathGen = d3.geoPath().projection(projection);
    // Arrow marker for flow lines
    svg.append("defs").append("marker")
        .attr("id", "flow-arrow")
        .attr("viewBox", "0 -4 8 8")
        .attr("refX", 6).attr("refY", 0)
        .attr("markerWidth", 4).attr("markerHeight", 4)
        .attr("orient", "auto")
        .append("path")
        .attr("d", "M0,-4L8,0L0,4")
        .attr("fill", "#4fb8f7")
        .attr("opacity", 0.6);

    g = svg.append("g");

    svg.call(d3.zoom().scaleExtent([0.7,14]).on("zoom", e => g.attr("transform", e.transform)));

    const countries = topojson.feature(world, world.objects.countries);

    g.selectAll(".country")
        .data(countries.features).join("path")
        .attr("class","country").attr("d", pathGen)
        .attr("fill", d => getColor(dataByNumId[+d.id], currentMetric))
        .attr("stroke","#070910").attr("stroke-width", 0.3)
        .on("mousemove", (e, d) => { showTip(e, d, dataByNumId[+d.id]); moveTip(e); })
        .on("mouseout", () => { document.getElementById("tooltip").style.display = "none"; })
        .on("click", (e, d) => {
            document.getElementById("tooltip").style.display = "none";
            const data = dataByNumId[+d.id];
            const name = data?.name || d.properties.name;
            if (selectedEl) d3.select(selectedEl).classed("selected", false);
            selectedEl = e.currentTarget;
            d3.select(selectedEl).classed("selected", true);
            if (compareMode) addToCompare(data, name);
            else { openProfile(data, name); updateUrl({country: data?.country || ""}); }
        });

    buildLegend(currentMetric);

    // Auto-open country from URL param
    if (params.country) {
        setTimeout(() => selectCountry(params.country), 300);
    }

    window.addEventListener("resize", () => {
        const W2 = cont.clientWidth, H2 = cont.clientHeight;
        projection.scale(W2/6.3).translate([W2/2, H2/2+20]);
        pathGen = d3.geoPath().projection(projection);
        d3.selectAll(".country").attr("d", pathGen);
    });
}

init();
</script>
