<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncologyAtlas — Global Cancer Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }
        
        #header {
            padding: 16px 24px;
            background: #1a1d27;
            border-bottom: 1px solid #2d3148;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #header h1 { font-size: 20px; font-weight: 600; }
        #header h1 span { color: #6c8ebf; }
        
        #controls {
            padding: 12px 24px;
            background: #1a1d27;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        select, button {
            background: #2d3148;
            border: 1px solid #404568;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover { background: #3d4568; }
        
        #map { height: calc(100vh - 130px); }
        
        #legend {
            position: absolute;
            bottom: 32px;
            right: 16px;
            background: rgba(26,29,39,0.92);
            border: 1px solid #2d3148;
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            font-size: 13px;
        }
        #legend h4 { margin-bottom: 8px; color: #aaa; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .legend-color { width: 18px; height: 14px; border-radius: 2px; }
        
        #tooltip {
            position: absolute;
            background: rgba(26,29,39,0.95);
            border: 1px solid #2d3148;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 13px;
            pointer-events: none;
            z-index: 2000;
            display: none;
        }
    </style>
</head>
<body>

<div id="header">
    <h1>Oncology<span>Atlas</span></h1>
    <span style="color:#666; font-size:13px">Global Cancer Data — Open Source</span>
</div>

<div id="controls">
    <select id="cancerType">
        <option value="all">All Cancers</option>
        <option value="lung">Lung</option>
        <option value="breast">Breast</option>
        <option value="colon">Colorectal</option>
        <option value="prostate">Prostate</option>
        <option value="stomach">Stomach</option>
        <option value="liver">Liver</option>
    </select>
    <select id="metric">
        <option value="incidence">Incidence (per 100k)</option>
        <option value="mortality">Mortality (per 100k)</option>
    </select>
    <select id="sex">
        <option value="all">All</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>
    <select id="year">
        <option value="2022">2022</option>
        <option value="2020">2020</option>
    </select>
    <button onclick="updateMap()">Update Map</button>
</div>

<div id="map"></div>

<div id="legend">
    <h4>Incidence per 100k</h4>
    <div class="legend-item"><div class="legend-color" style="background:#ffffb2"></div> &lt;100</div>
    <div class="legend-item"><div class="legend-color" style="background:#fecc5c"></div> 100-200</div>
    <div class="legend-item"><div class="legend-color" style="background:#fd8d3c"></div> 200-300</div>
    <div class="legend-item"><div class="legend-color" style="background:#f03b20"></div> 300-400</div>
    <div class="legend-item"><div class="legend-color" style="background:#bd0026"></div> 400+</div>
    <div class="legend-item"><div class="legend-color" style="background:#333"></div> No data</div>
</div>

<div id="tooltip"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    zoomControl: true
});

// Dark tile layer
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap © CARTO',
    subdomains: 'abcd',
    maxZoom: 10
}).addTo(map);

let geojsonLayer = null;

function getColor(value) {
    if (!value) return '#1a1d27';
    if (value < 100) return '#ffffb2';
    if (value < 200) return '#fecc5c';
    if (value < 300) return '#fd8d3c';
    if (value < 400) return '#f03b20';
    return '#bd0026';
}

function updateMap() {
    const type = document.getElementById('cancerType').value;
    const metric = document.getElementById('metric').value;
    const sex = document.getElementById('sex').value;
    const year = document.getElementById('year').value;

    // TODO: fetch from API and join with GeoJSON
    console.log('Fetching:', {type, metric, sex, year});
    
    // Placeholder — load world GeoJSON
    fetch('https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson')
        .then(r => r.json())
        .then(data => {
            if (geojsonLayer) map.removeLayer(geojsonLayer);
            
            geojsonLayer = L.geoJSON(data, {
                style: feature => ({
                    fillColor: getColor(Math.random() * 500), // placeholder — replace with real data
                    weight: 0.5,
                    opacity: 0.7,
                    color: '#2d3148',
                    fillOpacity: 0.75
                }),
                onEachFeature: (feature, layer) => {
                    layer.on({
                        mouseover: e => {
                            const tooltip = document.getElementById('tooltip');
                            tooltip.style.display = 'block';
                            tooltip.innerHTML = `<b>${feature.properties.ADMIN}</b><br>Data loading...`;
                        },
                        mouseout: () => {
                            document.getElementById('tooltip').style.display = 'none';
                        },
                        mousemove: e => {
                            const tooltip = document.getElementById('tooltip');
                            tooltip.style.left = (e.originalEvent.pageX + 12) + 'px';
                            tooltip.style.top = (e.originalEvent.pageY - 28) + 'px';
                        }
                    });
                }
            }).addTo(map);
        });
}

// Initial load
updateMap();
</script>

</body>
</html>
