<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncologyAtlas — Global Cancer Data</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* Hide default Leaflet marker if accidentally instantiated */
        .leaflet-marker-pane, .leaflet-shadow-pane { display: none !important; }
    </style>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .leaflet-default-icon-path { display: none !important; }
        .leaflet-marker-icon, .leaflet-marker-shadow { display: none !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; }

        #header {
            padding: 14px 24px;
            background: #1a1d27;
            border-bottom: 1px solid #2d3148;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        #header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
        #header h1 span { color: #5b8dee; }
        #header .sub { color: #555; font-size: 13px; margin-left: auto; }
        #header .badge {
            background: #1e3a5f;
            color: #5b8dee;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 99px;
            border: 1px solid #2d5a9e;
        }

        #controls {
            padding: 10px 20px;
            background: #14161f;
            border-bottom: 1px solid #1e2132;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        label { font-size: 12px; color: #666; margin-right: 4px; }
        select {
            background: #1e2132;
            border: 1px solid #2d3148;
            color: #ccc;
            padding: 6px 10px;
            border-radius: 5px;
            font-size: 13px;
            cursor: pointer;
        }
        select:hover { border-color: #5b8dee; }

        #map { height: calc(100vh - 108px); width: 100%; }

        #info-panel {
            position: absolute;
            top: 120px;
            right: 16px;
            width: 280px;
            background: rgba(20,22,31,0.95);
            border: 1px solid #2d3148;
            border-radius: 10px;
            padding: 16px;
            z-index: 1000;
            font-size: 13px;
            display: none;
        }
        #info-panel h3 { font-size: 16px; margin-bottom: 12px; color: #fff; }
        .metric { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #1e2132; }
        .metric:last-child { border-bottom: none; }
        .metric-label { color: #888; font-size: 12px; }
        .metric-value { font-weight: 600; color: #5b8dee; }
        .metric-value.yes { color: #4caf82; }
        .metric-value.no { color: #e05c5c; }

        #legend {
            position: absolute;
            bottom: 28px;
            left: 16px;
            background: rgba(20,22,31,0.92);
            border: 1px solid #2d3148;
            border-radius: 8px;
            padding: 12px 16px;
            z-index: 1000;
            font-size: 12px;
        }
        #legend h4 { margin-bottom: 8px; color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .l-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .l-box { width: 16px; height: 12px; border-radius: 2px; flex-shrink: 0; }

        #stats-bar {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,22,31,0.92);
            border: 1px solid #2d3148;
            border-radius: 8px;
            padding: 8px 20px;
            z-index: 1000;
            font-size: 12px;
            color: #666;
            display: flex;
            gap: 20px;
        }
        #stats-bar span { color: #5b8dee; font-weight: 600; }
    </style>
</head>
<body>

<div id="header">
    <h1>Oncology<span>Atlas</span></h1>
    <div class="badge">WHO Data 2019-2022</div>
    <div class="sub">194 countries · Open Source · MIT</div>
</div>

<div id="controls">
    <label>Metric</label>
    <select id="metric" onchange="updateMap()">
        <option value="breast_cancer_daly">Breast Cancer — DALYs per 100k</option>
        <option value="oral_cancer_rate">Oral Cancer Rate per 100k</option>
        <option value="oral_cancer_cases">Oral Cancer — New Cases</option>
        <option value="cancer_surgery">Cancer Surgery Available</option>
        <option value="cancer_registry">National Cancer Registry</option>
        <option value="cancer_plan">National Cancer Action Plan</option>
    </select>
    <label style="margin-left:12px">Coverage</label>
    <select id="coverage" onchange="updateMap()">
        <option value="all">All Countries</option>
        <option value="AFR">Africa</option>
        <option value="AMR">Americas</option>
        <option value="EUR">Europe</option>
        <option value="SEAR">South-East Asia</option>
        <option value="WPR">Western Pacific</option>
    </select>
</div>

<div id="map"></div>

<div id="info-panel">
    <h3 id="panel-country">—</h3>
    <div id="panel-metrics"></div>
</div>

<div id="legend">
    <h4 id="legend-title">DALYs per 100k</h4>
    <div id="legend-items"></div>
</div>

<div id="stats-bar">
    Countries loaded: <span id="stat-countries">—</span> &nbsp;|&nbsp;
    Data source: <span>WHO GHO 2019-2022</span> &nbsp;|&nbsp;
    <a href="https://github.com/notageek88/oncology-atlas" target="_blank" style="color:#5b8dee; text-decoration:none;">GitHub ↗</a>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let cancerData = {};
let geojsonLayer = null;
let worldGeoJSON = null;

const map = L.map('map', { center: [20, 10], zoom: 2, zoomControl: true, attributionControl: false });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 10
}).addTo(map);

// ISO3 → ISO2 mapping for GeoJSON join
const iso3to2 = {"AFG":"AF","ALB":"AL","DZA":"DZ","AND":"AD","AGO":"AO","ARG":"AR","ARM":"AM","AUS":"AU","AUT":"AT","AZE":"AZ","BHS":"BS","BHR":"BH","BGD":"BD","BLR":"BY","BEL":"BE","BLZ":"BZ","BEN":"BJ","BTN":"BT","BOL":"BO","BIH":"BA","BWA":"BW","BRA":"BR","BRN":"BN","BGR":"BG","BFA":"BF","BDI":"BI","CPV":"CV","KHM":"KH","CMR":"CM","CAN":"CA","CAF":"CF","TCD":"TD","CHL":"CL","CHN":"CN","COL":"CO","COM":"KM","COD":"CD","COG":"CG","CRI":"CR","CIV":"CI","HRV":"HR","CUB":"CU","CYP":"CY","CZE":"CZ","DNK":"DK","DJI":"DJ","DOM":"DO","ECU":"EC","EGY":"EG","SLV":"SV","GNQ":"GQ","ERI":"ER","EST":"EE","SWZ":"SZ","ETH":"ET","FJI":"FJ","FIN":"FI","FRA":"FR","GAB":"GA","GMB":"GM","GEO":"GE","DEU":"DE","GHA":"GH","GRC":"GR","GTM":"GT","GIN":"GN","GNB":"GW","GUY":"GY","HTI":"HT","HND":"HN","HUN":"HU","ISL":"IS","IND":"IN","IDN":"ID","IRN":"IR","IRQ":"IQ","IRL":"IE","ISR":"IL","ITA":"IT","JAM":"JM","JPN":"JP","JOR":"JO","KAZ":"KZ","KEN":"KE","PRK":"KP","KOR":"KR","KWT":"KW","KGZ":"KG","LAO":"LA","LVA":"LV","LBN":"LB","LSO":"LS","LBR":"LR","LBY":"LY","LTU":"LT","LUX":"LU","MDG":"MG","MWI":"MW","MYS":"MY","MDV":"MV","MLI":"ML","MLT":"MT","MRT":"MR","MUS":"MU","MEX":"MX","MDA":"MD","MNG":"MN","MNE":"ME","MAR":"MA","MOZ":"MZ","MMR":"MM","NAM":"NA","NPL":"NP","NLD":"NL","NZL":"NZ","NIC":"NI","NER":"NE","NGA":"NG","MKD":"MK","NOR":"NO","OMN":"OM","PAK":"PK","PAN":"PA","PNG":"PG","PRY":"PY","PER":"PE","PHL":"PH","POL":"PL","PRT":"PT","QAT":"QA","ROU":"RO","RUS":"RU","RWA":"RW","SAU":"SA","SEN":"SN","SRB":"RS","SLE":"SL","SGP":"SG","SVK":"SK","SVN":"SI","SOM":"SO","ZAF":"ZA","SSD":"SS","ESP":"ES","LKA":"LK","SDN":"SD","SUR":"SR","SWE":"SE","CHE":"CH","SYR":"SY","TWN":"TW","TJK":"TJ","TZA":"TZ","THA":"TH","TLS":"TL","TGO":"TG","TTO":"TT","TUN":"TN","TUR":"TR","TKM":"TM","UGA":"UG","UKR":"UA","ARE":"AE","GBR":"GB","USA":"US","URY":"UY","UZB":"UZ","VEN":"VE","VNM":"VN","YEM":"YE","ZMB":"ZM","ZWE":"ZW"};

const METRICS = {
    breast_cancer_daly: {
        label: "Breast Cancer DALYs per 100k",
        type: "numeric",
        thresholds: [80, 120, 160, 200],
        colors: ["#ffffb2","#fecc5c","#fd8d3c","#f03b20","#bd0026"],
        labels: ["< 80","80-120","120-160","160-200","200+"]
    },
    oral_cancer_rate: {
        label: "Oral Cancer Rate per 100k",
        type: "numeric",
        thresholds: [2, 4, 6, 10],
        colors: ["#edf8fb","#b2e2e2","#66c2a4","#2ca25f","#006d2c"],
        labels: ["< 2","2-4","4-6","6-10","10+"]
    },
    oral_cancer_cases: {
        label: "Oral Cancer New Cases",
        type: "numeric",
        thresholds: [500, 2000, 10000, 50000],
        colors: ["#f2f0f7","#cbc9e2","#9e9ac8","#756bb1","#54278f"],
        labels: ["< 500","500-2k","2k-10k","10k-50k","50k+"]
    },
    cancer_surgery: { label: "Cancer Surgery Available", type: "boolean" },
    cancer_registry: { label: "National Cancer Registry", type: "boolean" },
    cancer_plan: { label: "National Cancer Action Plan", type: "boolean" }
};

const boolColors = { "Yes": "#4caf82", "No": "#e05c5c", "Partial": "#f0a030" };

function getColor(value, metric) {
    const m = METRICS[metric];
    if (!value && value !== 0) return "#1a1d27";
    if (m.type === "boolean") return boolColors[value] || "#444";
    const n = parseFloat(value);
    if (isNaN(n)) return "#1a1d27";
    for (let i = 0; i < m.thresholds.length; i++) {
        if (n < m.thresholds[i]) return m.colors[i];
    }
    return m.colors[m.colors.length - 1];
}

function buildLegend(metric) {
    const m = METRICS[metric];
    const container = document.getElementById("legend-items");
    const title = document.getElementById("legend-title");
    title.textContent = m.label;
    container.innerHTML = "";
    if (m.type === "boolean") {
        [["Yes","#4caf82"],["No","#e05c5c"],["No data","#1a1d27"]].forEach(([l,c]) => {
            container.innerHTML += `<div class="l-row"><div class="l-box" style="background:${c}"></div>${l}</div>`;
        });
    } else {
        m.labels.forEach((l, i) => {
            container.innerHTML += `<div class="l-row"><div class="l-box" style="background:${m.colors[i]}"></div>${l}</div>`;
        });
        container.innerHTML += `<div class="l-row"><div class="l-box" style="background:#1a1d27; border:1px solid #333"></div>No data</div>`;
    }
}

function showPanel(country, data) {
    const panel = document.getElementById("info-panel");
    document.getElementById("panel-country").textContent = country;
    const metricsHtml = Object.entries(METRICS).map(([key, m]) => {
        const val = data[key];
        const isYes = val === "Yes";
        const isNo = val === "No";
        const cls = isYes ? "yes" : isNo ? "no" : "";
        return `<div class="metric">
            <span class="metric-label">${m.label}</span>
            <span class="metric-value ${cls}">${val !== undefined ? val : "—"}</span>
        </div>`;
    }).join("");
    document.getElementById("panel-metrics").innerHTML = metricsHtml;
    panel.style.display = "block";
}

function updateMap() {
    if (!worldGeoJSON) return;
    const metric = document.getElementById("metric").value;
    buildLegend(metric);

    if (geojsonLayer) map.removeLayer(geojsonLayer);

    geojsonLayer = L.geoJSON(worldGeoJSON, {
        style: feature => {
            const iso3 = feature.properties.ISO_A3;
            const data = cancerData[iso3];
            const value = data ? data[metric] : null;
            return {
                fillColor: getColor(value, metric),
                weight: 0.5,
                opacity: 0.8,
                color: "#0f1117",
                fillOpacity: 0.8
            };
        },
        onEachFeature: (feature, layer) => {
            const iso3 = feature.properties.ISO_A3;
            const name = feature.properties.ADMIN || feature.properties.name;
            const data = cancerData[iso3];

            layer.on({
                mouseover: e => {
                    e.target.setStyle({ weight: 2, color: "#5b8dee", fillOpacity: 0.9 });
                    if (data) showPanel(name, data);
                },
                mouseout: e => {
                    geojsonLayer.resetStyle(e.target);
                    document.getElementById("info-panel").style.display = "none";
                },
                click: e => {
                    if (data) showPanel(name, data);
                }
            });
        }
    }).addTo(map);
}

// Load data
async function init() {
    // Load WHO cancer data
    const resp = await fetch("data/countries_cancer.json");
    const arr = await resp.json();
    arr.forEach(d => { cancerData[d.country] = d; });
    document.getElementById("stat-countries").textContent = arr.length;

    // Load world GeoJSON
    const geoResp = await fetch("https://raw.githubusercontent.com/datasets/geo-countries/master/data/countries.geojson");
    worldGeoJSON = await geoResp.json();

    // Map ISO2 → ISO3 in our data (GeoJSON uses ISO_A3)
    // Our WHO data already uses ISO3 codes, GeoJSON has ISO_A3 field
    buildLegend("breast_cancer_daly");
    updateMap();
}

init();
</script>
</body>
</html>
