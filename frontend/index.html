<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncologyAtlas — Global Cancer Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b0d14; color: #e0e0e0; overflow: hidden; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 12px 24px;
            background: rgba(15,17,28,0.95);
            border-bottom: 1px solid #1e2235;
            display: flex; align-items: center; gap: 14px;
            backdrop-filter: blur(8px);
        }
        #header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        #header h1 span { color: #4f8ef7; }
        .badge {
            background: #0f2040; color: #4f8ef7;
            font-size: 11px; padding: 3px 9px;
            border-radius: 99px; border: 1px solid #1e3a6e;
        }
        .meta { color: #444; font-size: 12px; margin-left: auto; }

        #controls {
            position: fixed; top: 52px; left: 0; right: 0; z-index: 100;
            padding: 8px 20px;
            background: rgba(11,13,20,0.92);
            border-bottom: 1px solid #141624;
            display: flex; gap: 10px; align-items: center;
            backdrop-filter: blur(6px);
        }
        label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }
        select {
            background: #13162a; border: 1px solid #1e2235;
            color: #ccc; padding: 6px 10px;
            border-radius: 5px; font-size: 13px; cursor: pointer;
            transition: border-color 0.2s;
        }
        select:hover, select:focus { border-color: #4f8ef7; outline: none; }

        #map-container {
            position: fixed; top: 92px; left: 0; right: 0; bottom: 0;
        }
        svg { width: 100%; height: 100%; }

        .country { transition: opacity 0.15s; cursor: pointer; }
        .country:hover { opacity: 0.75; stroke: #4f8ef7 !important; stroke-width: 1.5px !important; }
        .country.selected { stroke: #fff !important; stroke-width: 1.5px !important; }

        /* Tooltip */
        #tooltip {
            position: fixed; pointer-events: none; z-index: 200;
            background: rgba(11,13,20,0.97);
            border: 1px solid #1e2235;
            border-radius: 10px; padding: 14px 18px;
            font-size: 13px; min-width: 240px;
            display: none;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        #tooltip h3 { font-size: 15px; margin-bottom: 10px; color: #fff; }
        .t-row { display: flex; justify-content: space-between; gap: 16px; padding: 4px 0; border-bottom: 1px solid #13162a; }
        .t-row:last-child { border: none; }
        .t-label { color: #666; font-size: 11px; }
        .t-val { font-weight: 600; color: #4f8ef7; font-size: 12px; }
        .t-val.yes { color: #3dba7e; }
        .t-val.no { color: #e05c5c; }

        /* Legend */
        #legend {
            position: fixed; bottom: 24px; left: 20px; z-index: 100;
            background: rgba(11,13,20,0.92);
            border: 1px solid #1e2235;
            border-radius: 10px; padding: 14px 18px;
            font-size: 12px; min-width: 160px;
            backdrop-filter: blur(6px);
        }
        #legend h4 { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }
        #legend-gradient { height: 10px; border-radius: 5px; margin-bottom: 6px; }
        #legend-labels { display: flex; justify-content: space-between; color: #555; font-size: 10px; }
        .bool-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
        .bool-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        /* Stats */
        #stats {
            position: fixed; bottom: 24px; right: 20px; z-index: 100;
            background: rgba(11,13,20,0.92); border: 1px solid #1e2235;
            border-radius: 8px; padding: 8px 16px;
            font-size: 11px; color: #555;
            backdrop-filter: blur(6px);
        }
        #stats span { color: #4f8ef7; }
        #stats a { color: #4f8ef7; text-decoration: none; }
        #stats a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div id="header">
    <h1>Oncology<span>Atlas</span></h1>
    <div class="badge">WHO Data 2019–2022</div>
    <div class="meta">194 countries · Open Source · MIT ·
        <a href="https://github.com/notageek88/oncology-atlas" target="_blank" style="color:#4f8ef7;text-decoration:none">GitHub ↗</a>
    </div>
</div>

<div id="controls">
    <label>Metric</label>
    <select id="metric" onchange="updateMap()">
        <option value="breast_cancer_daly">Breast Cancer — DALYs per 100k</option>
        <option value="oral_cancer_rate">Oral Cancer Rate per 100k</option>
        <option value="oral_cancer_cases">Oral Cancer — New Cases</option>
        <option value="cancer_surgery">Cancer Surgery Available</option>
        <option value="cancer_registry">National Cancer Registry</option>
        <option value="cancer_plan">National Cancer Action Plan</option>
    </select>
</div>

<div id="map-container">
    <svg id="svg"></svg>
</div>

<div id="tooltip"></div>

<div id="legend">
    <h4 id="legend-title">DALYs per 100k</h4>
    <div id="legend-body"></div>
</div>

<div id="stats">
    Countries: <span id="stat-n">—</span> &nbsp;|&nbsp; Source: <span>WHO GHO</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
<script>
const METRICS = {
    breast_cancer_daly: {
        label: "Breast Cancer DALYs / 100k",
        type: "numeric",
        domain: [60, 100, 140, 180, 220],
        colors: ["#0d1b3e","#1a4080","#2366c2","#4f8ef7","#a8c8ff"],
        nodata: "#13162a"
    },
    oral_cancer_rate: {
        label: "Oral Cancer Rate / 100k",
        type: "numeric",
        domain: [1, 2, 4, 7, 12],
        colors: ["#0d2e1a","#14562e","#1e8044","#2db565","#6de0a0"],
        nodata: "#13162a"
    },
    oral_cancer_cases: {
        label: "Oral Cancer New Cases",
        type: "numeric",
        domain: [50, 300, 2000, 15000, 60000],
        colors: ["#1a0d30","#3d1a72","#6b2fc4","#9b5fea","#cba8f8"],
        nodata: "#13162a"
    },
    cancer_surgery: { label: "Cancer Surgery Available", type: "boolean" },
    cancer_registry: { label: "National Cancer Registry", type: "boolean" },
    cancer_plan: { label: "National Cancer Action Plan", type: "boolean" }
};

const BOOL_COLORS = { "Yes": "#2db565", "No": "#e05c5c", default: "#2a2d3e" };

let cancerByNumId = {};
let worldData = null;
let projection, pathGen, svg, g;

function getColor(d, metric) {
    const m = METRICS[metric];
    if (!d) return m.nodata || "#13162a";
    const val = d[metric];
    if (val === undefined || val === null) return m.nodata || "#13162a";
    if (m.type === "boolean") return BOOL_COLORS[val] || BOOL_COLORS.default;
    const n = parseFloat(val);
    if (isNaN(n)) return m.nodata || "#13162a";
    const scale = d3.scaleThreshold().domain(m.domain).range([m.nodata, ...m.colors]);
    return scale(n);
}

function buildLegend(metric) {
    const m = METRICS[metric];
    document.getElementById("legend-title").textContent = m.label;
    const body = document.getElementById("legend-body");
    if (m.type === "boolean") {
        body.innerHTML = [
            ["Yes", "#2db565"], ["No", "#e05c5c"], ["No data", "#2a2d3e"]
        ].map(([l,c]) => `<div class="bool-item"><div class="bool-dot" style="background:${c}"></div>${l}</div>`).join("");
    } else {
        const grad = `linear-gradient(to right, ${[m.nodata, ...m.colors].join(", ")})`;
        body.innerHTML = `
            <div id="legend-gradient" style="background:${grad}"></div>
            <div id="legend-labels">
                <span>${m.domain[0]}</span>
                <span>${m.domain[Math.floor(m.domain.length/2)]}</span>
                <span>${m.domain[m.domain.length-1]}+</span>
            </div>
            <div style="color:#444;font-size:10px;margin-top:4px">■ No data</div>
        `;
    }
}

function showTooltip(event, d, countryData) {
    const tip = document.getElementById("tooltip");
    const name = d.properties.name;
    const rows = Object.entries(METRICS).map(([key, m]) => {
        const val = countryData ? countryData[key] : null;
        const display = val !== null && val !== undefined ? val : "—";
        const cls = display === "Yes" ? "yes" : display === "No" ? "no" : "";
        return `<div class="t-row"><span class="t-label">${m.label}</span><span class="t-val ${cls}">${display}</span></div>`;
    }).join("");
    tip.innerHTML = `<h3>${name}</h3>${rows}`;
    tip.style.display = "block";
    positionTooltip(event);
}

function positionTooltip(event) {
    const tip = document.getElementById("tooltip");
    let x = event.clientX + 16, y = event.clientY - 10;
    if (x + 260 > window.innerWidth) x = event.clientX - 260;
    if (y + 200 > window.innerHeight) y = event.clientY - 200;
    tip.style.left = x + "px";
    tip.style.top = y + "px";
}

function updateMap() {
    if (!worldData) return;
    const metric = document.getElementById("metric").value;
    buildLegend(metric);
    d3.selectAll(".country")
        .transition().duration(400)
        .attr("fill", d => getColor(cancerByNumId[+d.id], metric));
}

async function init() {
    // Load data
    const [world, cancer] = await Promise.all([
        d3.json("data/world-110m.json"),
        d3.json("data/countries_cancer.json")
    ]);

    worldData = world;
    cancer.forEach(c => { if (c.numeric_id) cancerByNumId[c.numeric_id] = c; });
    document.getElementById("stat-n").textContent = cancer.length;

    // Setup SVG + projection
    const container = document.getElementById("map-container");
    const W = container.clientWidth, H = container.clientHeight;

    svg = d3.select("#svg").attr("width", W).attr("height", H);

    projection = d3.geoNaturalEarth1()
        .scale(W / 6.2)
        .translate([W / 2, H / 2]);

    pathGen = d3.geoPath().projection(projection);

    g = svg.append("g");

    // Zoom
    const zoom = d3.zoom()
        .scaleExtent([0.8, 12])
        .on("zoom", e => g.attr("transform", e.transform));
    svg.call(zoom);

    // Draw countries
    const countries = topojson.feature(world, world.objects.countries);
    const metric = document.getElementById("metric").value;

    g.selectAll(".country")
        .data(countries.features)
        .join("path")
        .attr("class", "country")
        .attr("d", pathGen)
        .attr("fill", d => getColor(cancerByNumId[+d.id], metric))
        .attr("stroke", "#0b0d14")
        .attr("stroke-width", 0.4)
        .on("mousemove", (event, d) => {
            showTooltip(event, d, cancerByNumId[+d.id]);
        })
        .on("mouseout", () => {
            document.getElementById("tooltip").style.display = "none";
        });

    buildLegend(metric);

    // Resize handler
    window.addEventListener("resize", () => {
        const W2 = container.clientWidth, H2 = container.clientHeight;
        projection.scale(W2 / 6.2).translate([W2 / 2, H2 / 2]);
        pathGen = d3.geoPath().projection(projection);
        d3.selectAll(".country").attr("d", pathGen);
    });
}

init();
</script>
</body>
</html>
