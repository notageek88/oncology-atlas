<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OncologyAtlas — Global Cancer Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b0d14; color: #e0e0e0; overflow: hidden; }

        #header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 11px 24px;
            background: rgba(11,13,20,0.97);
            border-bottom: 1px solid #1a1d2e;
            display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(10px);
        }
        #header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
        #header h1 span { color: #4f8ef7; }
        .badge { background: #0d1e3a; color: #4f8ef7; font-size: 10px; padding: 2px 8px; border-radius: 99px; border: 1px solid #1a3a6e; }
        .meta { color: #3a3f58; font-size: 11px; margin-left: auto; display: flex; gap: 14px; align-items: center; }
        .meta a { color: #4f8ef7; text-decoration: none; }
        .meta a:hover { text-decoration: underline; }

        #controls {
            position: fixed; top: 47px; left: 0; right: 0; z-index: 100;
            padding: 7px 20px;
            background: rgba(9,11,18,0.95);
            border-bottom: 1px solid #12151f;
            display: flex; gap: 8px; align-items: center;
            backdrop-filter: blur(8px);
        }
        .ctrl-label { font-size: 10px; color: #3a3f58; text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
        select {
            background: #10131f; border: 1px solid #1a1d2e;
            color: #aab; padding: 5px 10px;
            border-radius: 5px; font-size: 12px; cursor: pointer;
        }
        select:hover, select:focus { border-color: #4f8ef7; outline: none; color: #dde; }
        .sep { width: 1px; height: 20px; background: #1a1d2e; margin: 0 4px; }

        #map-container { position: fixed; top: 83px; left: 0; right: 0; bottom: 0; }
        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }

        .country { transition: opacity 0.12s, stroke 0.12s; }
        .country:hover { opacity: 0.8; }

        #tooltip {
            position: fixed; pointer-events: none; z-index: 300;
            background: rgba(9,11,18,0.97); border: 1px solid #1a1d2e;
            border-radius: 10px; padding: 13px 16px;
            font-size: 12px; min-width: 220px; max-width: 280px;
            display: none; box-shadow: 0 12px 40px rgba(0,0,0,0.7);
        }
        #tooltip h3 { font-size: 14px; margin-bottom: 10px; color: #eee; font-weight: 600; }
        .t-section { font-size: 9px; color: #3a3f58; text-transform: uppercase; letter-spacing: 0.6px; margin: 8px 0 4px; }
        .t-row { display: flex; justify-content: space-between; gap: 12px; padding: 3px 0; border-bottom: 1px solid #10131f; }
        .t-row:last-child { border: none; }
        .t-label { color: #555; font-size: 11px; }
        .t-val { font-weight: 600; font-size: 11px; color: #4f8ef7; white-space: nowrap; }
        .t-val.yes { color: #2db565; }
        .t-val.no { color: #e05c5c; }
        .t-val.partial { color: #f0a030; }

        #legend {
            position: fixed; bottom: 20px; left: 16px; z-index: 100;
            background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 9px; padding: 12px 15px; font-size: 11px; min-width: 150px;
            backdrop-filter: blur(8px);
        }
        #legend h4 { font-size: 9px; color: #3a3f58; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
        #leg-gradient { height: 8px; border-radius: 4px; margin-bottom: 5px; }
        #leg-labels { display: flex; justify-content: space-between; color: #3a3f58; font-size: 9px; }
        .bool-row { display: flex; align-items: center; gap: 7px; margin: 3px 0; font-size: 11px; color: #888; }
        .bool-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

        #stats {
            position: fixed; bottom: 20px; right: 16px; z-index: 100;
            background: rgba(9,11,18,0.95); border: 1px solid #1a1d2e;
            border-radius: 7px; padding: 7px 14px;
            font-size: 10px; color: #3a3f58;
        }
        #stats b { color: #4f8ef7; }
    </style>
</head>
<body>
<div id="header">
    <h1>Oncology<span>Atlas</span></h1>
    <div class="badge">WHO GHO 2019–2022</div>
    <div class="meta">
        <span>195 countries</span>
        <span>18 metrics</span>
        <a href="https://github.com/notageek88/oncology-atlas" target="_blank">GitHub ↗</a>
    </div>
</div>

<div id="controls">
    <span class="ctrl-label">Category</span>
    <select id="category" onchange="onCategoryChange()">
        <option value="death">Cancer Mortality (death rate / 100k)</option>
        <option value="daly">Disease Burden (DALYs / 100k)</option>
        <option value="infra">Healthcare Infrastructure</option>
    </select>
    <div class="sep"></div>
    <span class="ctrl-label">Cancer type</span>
    <select id="metric" onchange="updateMap()">
        <option value="death_cancer_all">All cancers combined</option>
        <option value="death_breast">Breast cancer</option>
        <option value="death_colon">Colorectal cancer</option>
        <option value="death_liver">Liver cancer</option>
        <option value="death_mouth">Mouth & oropharynx</option>
        <option value="death_oesophagus">Oesophagus cancer</option>
    </select>
</div>

<div id="map-container"><svg id="svg"></svg></div>
<div id="tooltip"></div>

<div id="legend">
    <h4 id="leg-title">Death rate / 100k</h4>
    <div id="leg-body"></div>
</div>

<div id="stats">
    Countries: <b id="stat-n">—</b> &nbsp;·&nbsp; Source: <b>WHO GHO</b> &nbsp;·&nbsp; MIT License
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson@3"></script>
<script>

// ── Metric definitions ──────────────────────────────────────────
const METRIC_GROUPS = {
    death: {
        label: "Death rate / 100k",
        options: {
            death_cancer_all: "All cancers",
            death_breast:     "Breast cancer",
            death_colon:      "Colorectal",
            death_liver:      "Liver cancer",
            death_mouth:      "Mouth & oropharynx",
            death_oesophagus: "Oesophagus",
        },
        type: "numeric",
        domain: [20, 50, 80, 120, 180],
        colors: ["#0d1433","#1a2d7a","#2855c2","#4f8ef7","#a0c4ff"],
        nodata: "#0f1220"
    },
    daly: {
        label: "DALYs / 100k",
        options: {
            daly_breast:     "Breast cancer",
            daly_colon:      "Colorectal",
            daly_liver:      "Liver cancer",
            daly_mouth:      "Mouth & oropharynx",
            daly_oesophagus: "Oesophagus",
        },
        type: "numeric",
        domain: [50, 100, 160, 220, 320],
        colors: ["#0d2615","#155228","#1e8040","#2db565","#7aeaaa"],
        nodata: "#0f1220"
    },
    infra: {
        label: "Healthcare availability",
        options: {
            cancer_surgery:   "Cancer surgery",
            cancer_registry:  "Cancer registry",
            cancer_plan:      "National cancer plan",
            breast_screening: "Breast cancer screening",
            cancer_dept:      "Cancer department (tertiary)",
        },
        type: "boolean",
        nodata: "#0f1220"
    }
};

const BOOL_COLORS = { "Yes": "#2db565", "No": "#e05c5c" };
const NODATA_COLOR = "#0f1220";

// ── State ────────────────────────────────────────────────────────
let dataByNumId = {};
let worldData = null;
let currentMetric = "death_cancer_all";
let svg, g, pathGen, projection;

// ── Category change ──────────────────────────────────────────────
function onCategoryChange() {
    const cat = document.getElementById("category").value;
    const group = METRIC_GROUPS[cat];
    const metricSel = document.getElementById("metric");
    metricSel.innerHTML = Object.entries(group.options)
        .map(([k, v]) => `<option value="${k}">${v}</option>`).join("");
    currentMetric = Object.keys(group.options)[0];
    metricSel.value = currentMetric;
    updateMap();
}

// ── Color scale ──────────────────────────────────────────────────
function getColor(d, metric) {
    const cat = getCat(metric);
    const group = METRIC_GROUPS[cat];
    if (!d) return group.nodata;
    const val = d[metric];
    if (val === undefined || val === null) return group.nodata;

    if (group.type === "boolean") return BOOL_COLORS[val] || "#2a2d40";

    const n = parseFloat(val);
    if (isNaN(n)) return group.nodata;

    const scale = d3.scaleThreshold()
        .domain(group.domain)
        .range([group.nodata, ...group.colors]);
    return scale(n);
}

function getCat(metric) {
    for (const [cat, g] of Object.entries(METRIC_GROUPS)) {
        if (metric in g.options || (cat === "death" && metric === "death_cancer_all")) return cat;
    }
    return "death";
}

// ── Legend ───────────────────────────────────────────────────────
function buildLegend(metric) {
    const cat = getCat(metric);
    const group = METRIC_GROUPS[cat];
    document.getElementById("leg-title").textContent = group.label;
    const body = document.getElementById("leg-body");

    if (group.type === "boolean") {
        body.innerHTML = [
            ["Yes","#2db565"], ["No","#e05c5c"], ["No data","#2a2d40"]
        ].map(([l, c]) =>
            `<div class="bool-row"><div class="bool-dot" style="background:${c}"></div>${l}</div>`
        ).join("");
    } else {
        const grad = [group.nodata, ...group.colors].join(", ");
        const lo = group.domain[0], mid = group.domain[Math.floor(group.domain.length/2)], hi = group.domain[group.domain.length-1];
        body.innerHTML = `
            <div id="leg-gradient" style="background:linear-gradient(to right,${grad})"></div>
            <div id="leg-labels"><span>${lo}</span><span>${mid}</span><span>${hi}+</span></div>
            <div style="color:#2a2d40;font-size:9px;margin-top:5px;display:flex;align-items:center;gap:5px">
                <div style="width:8px;height:8px;border-radius:50%;background:#0f1220;border:1px solid #1a1d2e"></div>No data
            </div>`;
    }
}

// ── Tooltip ──────────────────────────────────────────────────────
function showTip(event, d, data) {
    const tip = document.getElementById("tooltip");
    const name = data?.name || d.properties.name;

    let html = `<h3>${name}</h3>`;

    if (data) {
        // Mortality
        html += `<div class="t-section">Mortality (death / 100k)</div>`;
        [["All cancers", data.death_cancer_all], ["Breast", data.death_breast],
         ["Colorectal", data.death_colon], ["Liver", data.death_liver],
         ["Mouth", data.death_mouth]].forEach(([l, v]) => {
            if (v) html += `<div class="t-row"><span class="t-label">${l}</span><span class="t-val">${typeof v === 'number' ? v.toFixed(1) : v}</span></div>`;
        });

        // Infrastructure
        html += `<div class="t-section">Infrastructure</div>`;
        [["Surgery", data.cancer_surgery], ["Registry", data.cancer_registry],
         ["Plan", data.cancer_plan], ["Screening", data.breast_screening]].forEach(([l, v]) => {
            if (v) {
                const cls = v === "Yes" ? "yes" : v === "No" ? "no" : "";
                html += `<div class="t-row"><span class="t-label">${l}</span><span class="t-val ${cls}">${v}</span></div>`;
            }
        });
    } else {
        html += `<div class="t-row"><span class="t-label">No data available</span></div>`;
    }

    tip.innerHTML = html;
    tip.style.display = "block";
    moveTip(event);
}

function moveTip(event) {
    const tip = document.getElementById("tooltip");
    let x = event.clientX + 14, y = event.clientY - 10;
    if (x + 290 > window.innerWidth) x = event.clientX - 290;
    if (y + 260 > window.innerHeight) y = event.clientY - 260;
    tip.style.left = x + "px"; tip.style.top = y + "px";
}

// ── Map update ───────────────────────────────────────────────────
function updateMap() {
    currentMetric = document.getElementById("metric").value;
    buildLegend(currentMetric);
    if (!g) return;
    d3.selectAll(".country")
        .transition().duration(350)
        .attr("fill", d => getColor(dataByNumId[+d.id], currentMetric));
}

// ── Init ─────────────────────────────────────────────────────────
async function init() {
    const [world, cancer] = await Promise.all([
        d3.json("data/world-110m.json"),
        d3.json("data/countries_cancer.json")
    ]);

    worldData = world;
    cancer.forEach(c => { if (c.numeric_id) dataByNumId[c.numeric_id] = c; });
    document.getElementById("stat-n").textContent = cancer.length;

    const container = document.getElementById("map-container");
    const W = container.clientWidth, H = container.clientHeight;

    svg = d3.select("#svg").attr("width", W).attr("height", H);
    projection = d3.geoNaturalEarth1().scale(W / 6.3).translate([W / 2, H / 2 + 20]);
    pathGen = d3.geoPath().projection(projection);
    g = svg.append("g");

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.7, 14]).on("zoom", e => g.attr("transform", e.transform)));

    const countries = topojson.feature(world, world.objects.countries);

    g.selectAll(".country")
        .data(countries.features)
        .join("path")
        .attr("class", "country")
        .attr("d", pathGen)
        .attr("fill", d => getColor(dataByNumId[+d.id], currentMetric))
        .attr("stroke", "#070910")
        .attr("stroke-width", 0.3)
        .on("mousemove", (e, d) => { showTip(e, d, dataByNumId[+d.id]); moveTip(e); })
        .on("mouseout", () => { document.getElementById("tooltip").style.display = "none"; });

    buildLegend(currentMetric);

    window.addEventListener("resize", () => {
        const W2 = container.clientWidth, H2 = container.clientHeight;
        projection.scale(W2 / 6.3).translate([W2 / 2, H2 / 2 + 20]);
        pathGen = d3.geoPath().projection(projection);
        d3.selectAll(".country").attr("d", pathGen);
    });
}

init();
</script>
</body>
</html>
